<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#141D40"/>
      <stop offset="1" stop-color="#0B1026"/>
    </linearGradient>
    <linearGradient id="amber" x1="120" y1="120" x2="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFCE6B"/>
      <stop offset="1" stop-color="#F5A623"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop stop-color="#F5A623" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded app-icon background -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <rect width="512" height="512" rx="114" fill="url(#glow)"/>

  <!-- outer aperture ring -->
  <circle cx="256" cy="256" r="150" stroke="url(#amber)" stroke-width="20"/>

  <!-- aperture blades (the 'iris') -->
  <g stroke="url(#amber)" stroke-width="16" stroke-linecap="round" opacity="0.9">
    <path d="M256 128 A128 128 0 0 1 366 190"/>
    <path d="M384 256 A128 128 0 0 1 322 366"/>
    <path d="M256 384 A128 128 0 0 1 146 322"/>
    <path d="M128 256 A128 128 0 0 1 190 146"/>
  </g>

  <!-- teal 'awake' arc — the companion spark -->
  <path d="M256 88 A168 168 0 0 1 424 256" stroke="#3DD6B0" stroke-width="20" stroke-linecap="round"/>

  <!-- pupil / core -->
  <circle cx="256" cy="256" r="54" fill="url(#amber)"/>
  <circle cx="238" cy="238" r="16" fill="#FFF4DC" opacity="0.85"/>
</svg>
