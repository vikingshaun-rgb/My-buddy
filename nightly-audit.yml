# ─────────────────────────────────────────────────────────────────────────────
# Vision — nightly unattended audit.
#
# Runs the master brain-logic suite (audit-vision.js) every night on a schedule,
# with NO human present, and leaves you a report:
#   • On PASS  → a green check in the Actions tab (and an optional summary).
#   • On FAIL  → automatically opens a GitHub Issue titled "Vision nightly audit
#                failed" with the full report pasted in, so it's waiting for you
#                in the morning.
#
# It is REPORT-ONLY by design: it never edits or deploys your app. It finds and
# reports; you and Claude fix together. (An unsupervised bot editing a live app
# overnight is how you wake up to a broken deploy.)
#
# ── SETUP (one time) ──────────────────────────────────────────────────────────
#   1. Put audit-vision.js, audit-human.js, audit-100.js in your repo root
#      (same place as app.html / server.js).
#   2. Put this file at .github/workflows/nightly-audit.yml
#   3. For the nightly EMAIL to vikingshaun@icloud.com, add two repo secrets
#      (Settings → Secrets and variables → Actions → New repository secret):
#        MAIL_USERNAME = a Gmail address you own (the SENDER)
#        MAIL_PASSWORD = a Gmail APP PASSWORD (not your login password):
#          turn on 2FA, then create one at https://myaccount.google.com/apppasswords
#      (Your iCloud is the RECIPIENT — that's already hard-coded as `to:` below.
#       Sending FROM Gmail TO your iCloud inbox is the reliable path.)
#   4. Commit + push. GitHub runs it on the schedule below and emails you the
#      report every night, pass or fail. If you skip step 3, everything still
#      runs — you just won't get the email (GitHub still emails you on failure
#      to your account address, and the report is in the Actions run summary).
#
# ── CHANGE THE TIME ───────────────────────────────────────────────────────────
#   cron is in UTC. Brisbane is UTC+10 (no daylight saving).
#   The line below is set to 02:00 Brisbane = 16:00 UTC the previous day.
#   To pick another Brisbane hour H (24h):  UTC = (H - 10 + 24) % 24
#     e.g. 03:00 Brisbane → 17:00 UTC → "0 17 * * *"
#          23:00 Brisbane → 13:00 UTC → "0 13 * * *"
# ─────────────────────────────────────────────────────────────────────────────

name: Vision nightly audit

on:
  schedule:
    - cron: "0 16 * * *"      # 02:00 Brisbane (UTC+10). See note above to change.
  workflow_dispatch: {}        # also lets you run it manually from the Actions tab

permissions:
  contents: read
  issues: write                # needed to open an issue on failure

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax-check server.js and app.html scripts
        run: |
          node --check server.js
          node -e "const fs=require('fs');const h=fs.readFileSync('app.html','utf8');const s=[...h.matchAll(/<script(?![^>]*\bsrc=)[^>]*>([\s\S]*?)<\/script>/gi)].map(m=>m[1]).join('\n');fs.writeFileSync('/tmp/appjs.js',s);"
          node --check /tmp/appjs.js

      - name: Run the master audit
        id: audit
        run: |
          set +e
          node audit-vision.js app.html server.js | tee audit-report.txt
          echo "code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Run the human-session simulation (scorecard)
        id: human
        run: |
          set +e
          node audit-human.js app.html server.js | tee -a audit-report.txt
          echo "code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Run the 100 real-world simulations (scorecard)
        id: hundred
        run: |
          set +e
          node audit-100.js app.html server.js | tee -a audit-report.txt
          echo "code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Add report to the run summary
        if: always()
        run: |
          {
            echo "### Vision nightly audit"
            echo '```'
            cat audit-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # ── EMAIL THE REPORT EVERY NIGHT (pass or fail) ─────────────────────────
      # Sends the full report to Shaun's inbox on every run. Uses SMTP with two
      # repo secrets you set once (Settings → Secrets and variables → Actions):
      #   MAIL_USERNAME  = the sending email address (e.g. a Gmail you own)
      #   MAIL_PASSWORD  = an APP PASSWORD for that account (NOT the login pwd)
      # Gmail: turn on 2FA, then create an app password at
      #   https://myaccount.google.com/apppasswords  — paste that as MAIL_PASSWORD.
      # (iCloud can't be the SENDER easily; sending FROM a Gmail TO your iCloud
      #  inbox is the reliable path. The TO address below is your iCloud.)
      - name: Prepare the report for emailing
        if: always()
        id: mailbody
        run: |
          {
            echo 'text<<VISION_EOF'
            cat audit-report.txt
            echo 'VISION_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Email the report to Shaun
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Vision Nightly Audit <${{ secrets.MAIL_USERNAME }}>
          to: vikingshaun@icloud.com
          subject: >-
            Vision nightly audit — ${{ (steps.audit.outputs.code == '0' && steps.human.outputs.code == '0' && steps.hundred.outputs.code == '0') && 'PASS' || 'FAIL' }}
          # Full report inline (ready to read + copy-paste) AND attached.
          body: ${{ steps.mailbody.outputs.text }}
          attachments: audit-report.txt

      - name: Open an issue if the audit failed
        if: steps.audit.outputs.code != '0' || steps.human.outputs.code != '0' || steps.hundred.outputs.code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('audit-report.txt', 'utf8');
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Vision nightly audit failed — ${today}`,
              body: "The unattended nightly brain-logic audit failed. Full report:\n\n```\n" + body + "\n```\n\n_Report-only run — nothing was changed or deployed._",
              labels: ['vision-audit'],
            });

      - name: Fail the job if either audit failed
        if: steps.audit.outputs.code != '0' || steps.human.outputs.code != '0' || steps.hundred.outputs.code != '0'
        run: exit 1
